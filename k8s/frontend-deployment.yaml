apiVersion: apps/v1
kind: Deployment
metadata:
  name: wiki-frontend
  labels:
    app: wiki
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wiki
      tier: frontend
  template:
    metadata:
      labels:
        app: wiki
        tier: frontend
    spec:
      containers:
        - name: frontend
          image: wiki-frontend:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  selector:
    app: wiki
    tier: frontend
  ports:
    - port: 80
      targetPort: 80
